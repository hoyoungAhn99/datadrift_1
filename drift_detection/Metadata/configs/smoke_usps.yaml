seed: 42
device: cuda
multi_gpu:
  enabled: false
  backend: data_parallel
  device_ids: [0, 1]

dataset:
  name: USPS
  root: dataset
  val_ratio: 0.2

model:
  type: resnet18
  embedding_dim: 16

training:
  batch_size: 256
  num_workers: 0
  lr: 0.0001
  weight_decay: 0.00001
  epochs: 1
  patience: 1
  progress_bar: true

tensorboard:
  enabled: true
  log_dir: tensorboard

model_selection:
  metric: val_ood_auroc
  ood_score: knn
  default_checkpoint: auroc

ood:
  k: 1
  cov_reg: 0.001
