feature_generation:
  enable: false

density:
  covariance_type: shared_full
  eps: 1.0e-6
  covariance_shrinkage: 0.5

inference:
  score_type: gaussian_loglik
  temperature: 1.0
  prediction_mode: argmax
  collapse_ood_to_parent: true

cgm:
  enabled: true
  strict_pdf: true
  ood_density: positive_density_residual
  local_mode: density_softmax
  child_weight: uniform
  candidate_prior: uniform
  normalize_ood_pdf: true
  eps: 1.0e-12
