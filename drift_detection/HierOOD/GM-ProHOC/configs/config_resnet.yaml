feat:
  dim: 256                              # choices: any positive int
  normalize: True                       # choices: True, False
  model: "resnet50"                     # choices: resnet50, clip
  freeze_backbone: False                # choices: True, False
  resnet:
    weights: "imagenet"                 # choices: imagenet, null
  CLIP:
    model_name: "openai/clip-vit-base-patch32"  # choices: any CLIP vision model name

train:
  epoch: 90                             # choices: any positive int
  batch_size: 32                        # choices: any positive int
  num_workers: 4                        # choices: any nonnegative int
  lr: 0.0001                            # choices: any positive float

validation:
  enable_depth_eval: True               # choices: True, False
  depth_eval_every: 1                   # choices: any positive int

runtime:
  multi_gpu: False                      # choices: True, False
  device_ids: null                      # choices: null or list[int]
