base_config: idea3_fgvc_aircraft_b16_sparse_path.yaml

experiment:
  name: idea3-fgvc-aircraft-b16-sparse-path-mlp

runtime:
  device: cuda
  gpu_id: 1

image_adapter:
  mode: mlp
  hidden_dim: 1024
  dropout: 0.1
  residual: true
  normalize_output: true

positive_training:
  checkpoint: outputs/experiments/idea3-fgvc-aircraft-b16-sparse-path-mlp/checkpoints/idea3-fgvc-aircraft-b16-sparse-path-mlp-positive.pt
  result_path: outputs/experiments/idea3-fgvc-aircraft-b16-sparse-path-mlp/results/idea3-fgvc-aircraft-b16-sparse-path-mlp-positive_global_path.result
  diagnostics_path: outputs/experiments/idea3-fgvc-aircraft-b16-sparse-path-mlp/diagnostics/idea3-fgvc-aircraft-b16-sparse-path-mlp-positive-diagnostics.json

unknown_training:
  positive_checkpoint: outputs/experiments/idea3-fgvc-aircraft-b16-sparse-path-mlp/checkpoints/idea3-fgvc-aircraft-b16-sparse-path-mlp-positive.pt
  checkpoint: outputs/experiments/idea3-fgvc-aircraft-b16-sparse-path-mlp/checkpoints/idea3-fgvc-aircraft-b16-sparse-path-mlp-parent_unknown.pt
  result_path: outputs/experiments/idea3-fgvc-aircraft-b16-sparse-path-mlp/results/idea3-fgvc-aircraft-b16-sparse-path-mlp-parent_unknown.result
  diagnostics_path: outputs/experiments/idea3-fgvc-aircraft-b16-sparse-path-mlp/diagnostics/idea3-fgvc-aircraft-b16-sparse-path-mlp-unknown-diagnostics.json

inference:
  positive_checkpoint: outputs/experiments/idea3-fgvc-aircraft-b16-sparse-path-mlp/checkpoints/idea3-fgvc-aircraft-b16-sparse-path-mlp-positive.pt
  unknown_checkpoint: outputs/experiments/idea3-fgvc-aircraft-b16-sparse-path-mlp/checkpoints/idea3-fgvc-aircraft-b16-sparse-path-mlp-parent_unknown.pt
