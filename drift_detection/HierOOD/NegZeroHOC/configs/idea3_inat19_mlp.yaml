base_config: idea3_inat19.yaml

experiment:
  name: idea3-inat19-mlp

runtime:
  device: cuda
  gpu_id: 1

image_adapter:
  mode: mlp
  hidden_dim: 1024
  dropout: 0.1
  residual: true
  normalize_output: true

positive_training:
  checkpoint: outputs/checkpoints/idea3-inat19-mlp-positive.pt
  result_path: outputs/results/idea3-inat19-mlp-positive_child_only.result
  diagnostics_path: outputs/diagnostics/idea3-inat19-mlp-positive-diagnostics.json

unknown_training:
  positive_checkpoint: outputs/checkpoints/idea3-inat19-mlp-positive.pt
  checkpoint: outputs/checkpoints/idea3-inat19-mlp-parent_unknown.pt
  result_path: outputs/results/idea3-inat19-mlp-parent_unknown.result
  diagnostics_path: outputs/diagnostics/idea3-inat19-mlp-unknown-diagnostics.json

inference:
  positive_checkpoint: outputs/checkpoints/idea3-inat19-mlp-positive.pt
  unknown_checkpoint: outputs/checkpoints/idea3-inat19-mlp-parent_unknown.pt
