experiment:
  name: idea7-virtual-open-raw-slerp-fgvc-aircraft-b16-r16-qkvo
  output_root: outputs

runtime:
  device: cuda
  gpu_id: 0
  seed: 0

dataset:
  name: fgvc-aircraft
  datadir: D:/HY_Data/HierOOD/fgvc-aircraft
  hierarchy: hierarchies/fgvc-aircraft.json
  id_split: data/fgvc-aircraft-id-labels.csv

clip:
  model: openai/clip-vit-base-patch16
  tokenizer_model: openai/clip-vit-base-patch32
  local_files_only: true

dataloader:
  num_workers: 4

augmentation:
  image_size: 224
  eval_resize: 224
  random_resized_crop_scale:
    - 0.7
    - 1.0
  horizontal_flip_probability: 0.5
  color_jitter:
    probability: 0.5
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.0

positive:
  checkpoint: outputs/experiments/idea3-fgvc-aircraft-b16-joint-vision-lora-r16-qkvo-batch16/checkpoints/idea3-fgvc-aircraft-b16-joint-vision-lora-r16-qkvo-batch16-positive.pt

virtual_open_training:
  epochs: 50
  parents_per_step: 4
  max_examples_per_parent: 64
  vision_batch_size: 16
  lr: 0.0003
  weight_decay: 0.0001
  tau: 0.07
  precision: fp16
  gradient_clip_norm: 1.0

  prompt:
    count: 4
    prototype_ctx_tokens: 2

  virtual_features:
    samples_per_parent: 32
    mix_min: 0.35
    mix_max: 0.65
    refinement_steps: 0
    refinement_step_size: 0.1
    child_temperature: 0.07
    parent_weight: 0.5
    anchor_weight: 0.25

  loss:
    lambda_virtual: 1.0
    lambda_id_teacher: 1.0
    lambda_coverage: 0.2
    lambda_diversity: 0.05
    diversity_margin: 0.2
    depth_balanced: true

  validation:
    every_n_epochs: 1
    batch_size: 64
    max_id_bacc_drop: 0.08

  checkpoint: outputs/experiments/idea7-virtual-open-raw-slerp-fgvc-aircraft-b16-r16-qkvo/checkpoints/idea7-virtual-open-raw-slerp-fgvc-aircraft-b16-r16-qkvo.pt
  result_path: outputs/experiments/idea7-virtual-open-raw-slerp-fgvc-aircraft-b16-r16-qkvo/results/idea7-virtual-open-raw-slerp-fgvc-aircraft-b16-r16-qkvo-global-path.result
  diagnostics_path: outputs/experiments/idea7-virtual-open-raw-slerp-fgvc-aircraft-b16-r16-qkvo/diagnostics/idea7-virtual-open-raw-slerp-fgvc-aircraft-b16-r16-qkvo-diagnostics.json

inference:
  mode: parent_unknown_global_path
  unknown_aggregation: logmeanexp
  batch_size: 64
  tau: 14.285714
  allow_root_unknown: false
  greedy_ablation: true
