experiment:
  name: idea6-hc-negprompt-squared-hinge-fgvc-aircraft-b16-r16-qkvo
  output_root: outputs

runtime:
  device: cuda
  gpu_id: 0
  seed: 0

dataset:
  name: fgvc-aircraft
  datadir: D:/HY_Data/HierOOD/fgvc-aircraft
  hierarchy: hierarchies/fgvc-aircraft.json
  id_split: data/fgvc-aircraft-id-labels.csv

clip:
  model: openai/clip-vit-base-patch16
  tokenizer_model: openai/clip-vit-base-patch32
  local_files_only: true

dataloader:
  num_workers: 4

augmentation:
  image_size: 224
  eval_resize: 224
  random_resized_crop_scale:
    - 0.7
    - 1.0
  horizontal_flip_probability: 0.5
  color_jitter:
    probability: 0.5
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.0

positive:
  checkpoint: outputs/experiments/idea3-fgvc-aircraft-b16-joint-vision-lora-r16-qkvo-batch16/checkpoints/idea3-fgvc-aircraft-b16-joint-vision-lora-r16-qkvo-batch16-positive.pt

negative_training:
  method: hc_negprompt
  epochs: 30
  parents_per_step: 4
  max_examples_per_parent: 64
  vision_batch_size: 16
  lr: 0.0003
  weight_decay: 0.0001
  tau: 0.07
  precision: fp16
  gradient_clip_norm: 1.0
  prompt:
    count_per_child: 2
    prototype_ctx_tokens: 2
  loss:
    lambda_hnis: 1.0
    lambda_safe: 4.0
    lambda_shell: 0.05
    lambda_diversity: 0.05
    lambda_route: 0.2
    lambda_balance: 0.05
    hierarchy_tau: 0.07
    safety_margin: 0.5
    safety_mode: squared_hinge
    depth_balanced: true
  validation:
    every_n_epochs: 1
    batch_size: 64
    max_id_bacc_drop: 0.08
  checkpoint: outputs/experiments/idea6-hc-negprompt-squared-hinge-fgvc-aircraft-b16-r16-qkvo/checkpoints/idea6-hc-negprompt-squared-hinge-fgvc-aircraft-b16-r16-qkvo.pt
  result_path: outputs/experiments/idea6-hc-negprompt-squared-hinge-fgvc-aircraft-b16-r16-qkvo/results/idea6-hc-negprompt-squared-hinge-fgvc-aircraft-b16-r16-qkvo-global-path.result
  diagnostics_path: outputs/experiments/idea6-hc-negprompt-squared-hinge-fgvc-aircraft-b16-r16-qkvo/diagnostics/idea6-hc-negprompt-squared-hinge-fgvc-aircraft-b16-r16-qkvo-diagnostics.json

inference:
  mode: parent_unknown_global_path
  unknown_aggregation: logsumexp
  batch_size: 64
  tau: 14.285714
  allow_root_unknown: false
  greedy_ablation: true
