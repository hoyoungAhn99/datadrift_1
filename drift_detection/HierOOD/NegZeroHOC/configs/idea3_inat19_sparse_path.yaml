base_config: idea3_inat19.yaml

experiment:
  name: idea3-inat19-b16-sparse-path

positive_training:
  batch_size: 512
  loss:
    name: sparse_path_bottleneck
    prompt_scope: path_local
    execution: parent_stream
    bottleneck_weight: 0.5
    bottleneck_temperature: 0.5
    route_margin: 0.05
    margin_weight: 0.25
  eval_mode: positive_global_path
  checkpoint: outputs/checkpoints/idea3-inat19-b16-sparse-path-positive.pt
  result_path: outputs/results/idea3-inat19-b16-sparse-path-positive_global_path.result
  diagnostics_path: outputs/diagnostics/idea3-inat19-b16-sparse-path-positive-diagnostics.json

unknown_training:
  positive_checkpoint: outputs/checkpoints/idea3-inat19-b16-sparse-path-positive.pt
  checkpoint: outputs/checkpoints/idea3-inat19-b16-sparse-path-parent_unknown.pt
  result_path: outputs/results/idea3-inat19-b16-sparse-path-parent_unknown.result
  diagnostics_path: outputs/diagnostics/idea3-inat19-b16-sparse-path-unknown-diagnostics.json

inference:
  mode: positive_global_path
  positive_checkpoint: outputs/checkpoints/idea3-inat19-b16-sparse-path-positive.pt
  unknown_checkpoint: outputs/checkpoints/idea3-inat19-b16-sparse-path-parent_unknown.pt
  tau: 14.285714
