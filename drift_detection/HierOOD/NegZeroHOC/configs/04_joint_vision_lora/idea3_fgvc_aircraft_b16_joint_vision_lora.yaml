experiment:
  name: idea3-fgvc-aircraft-b16-joint-vision-lora
  output_root: outputs

runtime:
  device: cuda
  gpu_id: 0
  seed: 0

dataset:
  name: fgvc-aircraft
  datadir: D:/HY_Data/HierOOD/fgvc-aircraft
  hierarchy: hierarchies/fgvc-aircraft.json
  id_split: data/fgvc-aircraft-id-labels.csv

clip:
  model: openai/clip-vit-base-patch16
  tokenizer_model: openai/clip-vit-base-patch32
  local_files_only: true
  freeze_text_encoder: true
  freeze_image_encoder: true

dataloader:
  num_workers: 4

prompt:
  max_length: 77
  global_ctx_tokens: 4
  depth_ctx_tokens: 4
  parent_ctx_tokens: 4
  depth_embed_dim: 64
  parent_generator_hidden_dim: 512
  init_std: 0.02
  ablation: global_depth_parent
  unknown_prompts: 1

augmentation:
  image_size: 224
  eval_resize: 224
  random_resized_crop_scale:
    - 0.7
    - 1.0
  horizontal_flip_probability: 0.5
  color_jitter:
    probability: 0.5
    brightness: 0.2
    contrast: 0.2
    saturation: 0.1
    hue: 0.0

vision_lora:
  rank: 8
  alpha: 16.0
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
  layers: all

joint_training:
  epochs: 50
  batch_size: 16
  prompt_lr: 0.001
  vision_lora_lr: 0.0001
  weight_decay: 0.0001
  tau: 0.07
  precision: fp16
  gradient_checkpointing: true
  gradient_clip_norm: 1.0
  loss:
    name: sparse_path_bottleneck
    prompt_scope: path_local
    execution: parent_stream
    bottleneck_weight: 0.5
    bottleneck_temperature: 0.5
    route_margin: 0.05
    margin_weight: 0.25
  validation:
    enabled: true
    every_n_epochs: 1
    start_epoch: 1
    batch_size: 64
    mode: positive_global_path
  checkpoint: outputs/experiments/idea3-fgvc-aircraft-b16-joint-vision-lora/checkpoints/idea3-fgvc-aircraft-b16-joint-vision-lora-positive.pt
  result_path: outputs/experiments/idea3-fgvc-aircraft-b16-joint-vision-lora/results/idea3-fgvc-aircraft-b16-joint-vision-lora-positive_global_path.result
  diagnostics_path: outputs/experiments/idea3-fgvc-aircraft-b16-joint-vision-lora/diagnostics/idea3-fgvc-aircraft-b16-joint-vision-lora-positive-diagnostics.json

inference:
  mode: positive_global_path
  batch_size: 64
  tau: 14.285714
