    - 0.9
    - 1.0
  color_jitter:
    probability: 0.2
    brightness: 0.1
    contrast: 0.1
    saturation: 0.05
    hue: 0.0

joint_training:
  batch_size: 16
  checkpoint: outputs/experiments/idea3-fgvc-aircraft-b16-joint-vision-lora-weak-aug/checkpoints/idea3-fgvc-aircraft-b16-joint-vision-lora-weak-aug-positive.pt
  result_path: outputs/experiments/idea3-fgvc-aircraft-b16-joint-vision-lora-weak-aug/results/idea3-fgvc-aircraft-b16-joint-vision-lora-weak-aug-positive_global_path.result
  diagnostics_path: outputs/experiments/idea3-fgvc-aircraft-b16-joint-vision-lora-weak-aug/diagnostics/idea3-fgvc-aircraft-b16-joint-vision-lora-weak-aug-positive-diagnostics.json
